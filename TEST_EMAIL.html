<!DOCTYPE html>
<html>
<head>
    <title>Email Collection Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        input, button {
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }
        input {
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background: #4285F4;
            color: white;
            border: none;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #357ae8;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Email Collection Test</h1>
    <p>This will help us test if emails are reaching your Google Sheet.</p>

    <form id="emailForm">
        <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
        />
        <button type="submit">Test Submit</button>
    </form>

    <div id="result"></div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzxzsIyuS25KWsLhqhzdLBTy_PGxw6Z-Wv2XbESVkwGu-NFcZudh90QtYrfhZx5qvAOKg/exec';

        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const resultDiv = document.getElementById('result');

            resultDiv.innerHTML = 'Sending...';
            resultDiv.className = '';

            try {
                console.log('Sending to:', GOOGLE_SCRIPT_URL);
                console.log('Data:', { email, source: 'test_page' });

                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        source: 'test_page'
                    })
                });

                console.log('Response received (no-cors mode - can\'t read)');

                resultDiv.innerHTML = '✅ Sent! Check your Google Sheet now.<br><small>If you don\'t see a row, check the updated script in UPDATED_GOOGLE_SCRIPT.md</small>';
                resultDiv.className = 'success';

                document.getElementById('email').value = '';

            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = '❌ Error: ' + error.message;
                resultDiv.className = 'error';
            }
        });
    </script>
</body>
</html>
